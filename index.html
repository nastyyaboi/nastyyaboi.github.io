<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opiumdealer</title>
    <link rel="icon" href="https://gtaforums.com/uploads/monthly_2024_11/Untitled1.thumb.png.0202e1e495fbf0cf7d5ee6806fd37d38.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;700&display=swap" rel="stylesheet">

    <style>
      html, body {
          height: 100%;
          margin: 0;
          padding: 0;
          font-family: 'Doto', sans-serif;
          background-color: #000;
          color: white;
      }

      /* REVERTED: Original Center Viewport & Logo Container */
      .center-viewport {
          height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: transparent;
      }

      .logo-container {
          position: relative;
          width: 100%;
          height: 90vh;
          display: flex;
          justify-content: center;
          align-items: center;
          overflow: hidden;
      }

      .logo-container img {
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -45%);
          max-width: 70%;
          max-height: 70%;
          width: auto;
          height: auto;
          opacity: 0;
          transition: opacity 1s ease-in-out;
      }

      .logo-container img.active {
          opacity: 1;
      }

      /* UPDATED: Centered Footer Stack */
      .main-footer {
          position: fixed;
          bottom: 20px;
          left: 50%;
          transform: translateX(-50%);
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 12px; 
          width: 100%;
          z-index: 10;
          pointer-events: none; /* Allows clicks to pass through container */
      }
      
      .main-footer > * { pointer-events: auto; } /* Re-enable clicks for buttons/links */

      .music-btn {
          background: none;
          border: none;
          color: #eb4034;
          font-size: 10px;
          font-family: 'Doto', sans-serif;
          cursor: pointer;
          letter-spacing: 1px;
          transition: all 0.3s ease;
      }
      .music-btn:hover { opacity: 0.4; transform: scale(1.1); }

      .footer-group {
          display: flex;
          align-items: center;
          gap: 15px;
          white-space: nowrap;
      }

      .footer-text {
          color: #333;
          font-size: 10px;
          font-weight: normal;
      }

      .clock {
          font-size: 10px;
          font-weight: bold;
          color: white;
          background-color: #000;
          padding: 5px 10px;
          border-radius: 5px;
          border: 1px solid #333;
      }

      .social-icons {
          display: flex;
          gap: 15px;
          justify-content: center;
      }

      .social-icons img {
          width: 16px;
          height: auto;
          filter: invert(1);
      }

      /* Original Menu Styles */
      .hamburger-container {
          position: fixed;
          top: 20px;
          left: 20px;
          display: flex;
          align-items: center;
          cursor: pointer;
          z-index: 20;
      }
      .mods-text { margin-left: 10px; font-size: 13px; font-weight: bold; }

      #slideMenu {
          height: 100%;
          width: 340px;
          position: fixed;
          top: 0;
          left: 0;
          background: rgba(0, 0, 0, 0.5);
          backdrop-filter: blur(10px);
          transition: transform 0.5s ease;
          padding-top: 60px;
          z-index: 15;
          transform: translateX(-100%);
      }
      #slideMenu a { padding: 8px 32px; text-decoration: none; font-size: 18px; color: white; display: block; }
      .closebtn { font-size: 38px; position: absolute; top: 11px; right: 10px; background: none; border: none; color: white; cursor: pointer; }

    </style>
</head>
<body>

    <div class="center-viewport logo-container">
        <img src="https://i.imgur.com/aEBGNxg.gif" class="active" alt="Logo 1">
        <img src="https://i.imgur.com/bFcUrJt.gif" alt="Logo 2">
        <img src="https://i.imgur.com/K68Mp0C.gif" alt="Logo 3">
        <img src="https://i.imgur.com/v433Weo.gif" alt="Logo 4">
    </div>

    <div class="main-footer">
        <button class="music-btn" id="musicBtn">opiumdealer</button>

        <div class="footer-group">
            <span class="footer-text">© 2026 OD. some rights reserved.</span>
            <div id="clock" class="clock"></div>
        </div>

        <div class="social-icons">
            <a href="https://x.com/opmdlr" target="_blank" rel="noopener noreferrer">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/X_logo_2023.svg/330px-X_logo_2023.svg.png" alt="X">
            </a>
            <a href="https://www.youtube.com/@nastyyaboi" target="_blank" rel="noopener noreferrer">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/YouTube_social_dark_squircle_%282017%29.svg/120px-YouTube_social_dark_squircle_%282017%29.svg.png" alt="YouTube">
            </a>
        </div>
    </div>

    <div class="hamburger-container" onclick="openSlideMenu()">
        <div class="hamburger">&#9776;</div>
        <div class="mods-text">Mods</div>
    </div>

    <div id="slideMenu">
        <button class="closebtn" onclick="closeSlideMenu()">&times;</button>
        <a href="https://gtaforums.com/topic/989098-console-visuals-the-complete-edition/">Console Visuals │ GTAIV</a>
        <a href="https://gtaforums.com/topic/989368-compact-hud/">Compact HUD │ GTAIV</a>
        <a href="https://www.dixmor-hospital.com/mods/view/complete-ui-redux">Complete UI Redux │ Manhunt</a>
        <a href="https://gtaforums.com/topic/983493-grand-theft-auto-liberty-city-01/">Liberty City '01 │ GTAIII</a>
        <a href="https://www.nexusmods.com/thecrew/mods/5">MCLA FM │ The Crew</a>
    </div>

    <script>
        function updateClock() {
            var now = new Date();
            var hours = now.getHours(), minutes = now.getMinutes(), seconds = now.getSeconds();
            var period = hours >= 12 ? "PM" : "AM";
            if (hours > 12) hours -= 12; if (hours === 0) hours = 12;
            minutes = minutes < 10 ? "0"+minutes : minutes;
            seconds = seconds < 10 ? "0"+seconds : seconds;
            var day = now.getDate(), month = now.getMonth() + 1, year = now.getFullYear();
            var dayOfWeek = now.toLocaleString('en-us', { weekday: 'long' });
            document.getElementById('clock').textContent = dayOfWeek + ", " + month + "/" + day + "/" + year + " | " + hours + ":" + minutes + ":" + seconds + " " + period;
        }
        setInterval(updateClock, 1000); updateClock();

        function openSlideMenu() { document.getElementById("slideMenu").style.transform = "translateX(0)"; }
        function closeSlideMenu() { document.getElementById("slideMenu").style.transform = "translateX(-100%)"; }

        const logos = document.querySelectorAll('.logo-container img');
        let currentLogo = 0;
        setInterval(() => {
            const current = logos[currentLogo];
            current.classList.remove('active');
            setTimeout(() => {
                currentLogo = (currentLogo + 1) % logos.length;
                logos[currentLogo].classList.add('active');
            }, 1300);
        }, 20000);
    </script>
</body>
</html>
